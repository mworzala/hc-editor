name: CI

on:
    pull_request:
    workflow_call:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install
              run: bun install --frozen-lockfile

            # Desktop (@hollowcube/desktop) is excluded: its tsc run needs the
            # generated Wails bindings, which aren't produced in CI. Desktop is out
            # of scope for v1 — revisit this filter when desktop CI/release lands.
            - name: Typecheck
              run: >-
                  bun
                  --filter '@hollowcube/web'
                  --filter '@hollowcube/common'
                  --filter '@hollowcube/api'
                  --filter '@hollowcube/design-system'
                  typecheck

            - name: Test
              run: bun run test

            - name: Lint
              run: bun run lint

            - name: Format check
              run: bun run format:check
